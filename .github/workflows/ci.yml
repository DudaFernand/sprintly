name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sprintly
          POSTGRES_USER: sprintly
          POSTGRES_PASSWORD: sprintly
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: sprintly
          RABBITMQ_DEFAULT_PASS: sprintly
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes
        run: ./mvnw clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sprintly
          SPRING_DATASOURCE_USERNAME: sprintly
          SPRING_DATASOURCE_PASSWORD: sprintly
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_RABBITMQ_USERNAME: sprintly
          SPRING_RABBITMQ_PASSWORD: sprintly
          JWT_SECRET: chave-secreta-apenas-para-ci-nao-usar-em-producao-1234567890123456
          JWT_ACCESS_EXPIRATION: 900000
          JWT_REFRESH_EXPIRATION: 2592000000

      - name: Build da imagem Docker
        run: docker build -t sprintly:${{ github.sha }} .