spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=true
jwt.secret=test-secret-key-for-unit-tests-only-not-for-production-0123456789abcdef
jwt.access-expiration=900000
jwt.refresh-expiration=2592000000
app.cors.allowed-origins=http://localhost:3000
# Listeners não sobem nos testes — não exige RabbitMQ local para ./mvnw test
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=sprintly
spring.rabbitmq.password=sprintly
