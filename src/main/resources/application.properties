spring.application.name=sprintly
spring.datasource.url=jdbc:postgresql://localhost:5433/sprintly
spring.datasource.username=sprintly
spring.datasource.password=sprintly
spring.jpa.hibernate.ddl-auto=validate
# open-in-view=true enquanto controllers devolvem entidades JPA (lazy). Trocar para false + DTOs depois.
spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
server.port=8081
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false
jwt.secret=${JWT_SECRET}
jwt.access-expiration=900000
jwt.refresh-expiration=2592000000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=sprintly
spring.rabbitmq.password=sprintly
# Tag "Auth" primeiro (sem sort alfabético — senão AuditLog fica acima)
springdoc.swagger-ui.tags-sorter=
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.doc-expansion=list
