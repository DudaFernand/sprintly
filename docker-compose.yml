services:
  postgres:
    image: postgres:16-alpine
    container_name: sprintly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sprintly
      POSTGRES_USER: sprintly
      POSTGRES_PASSWORD: sprintly
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: